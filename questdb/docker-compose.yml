version: '3'
services:
  questdb:
    image: questdb/questdb:latest
    container_name: questdb
    restart: always
    ports:
      - "9000:9000"  # Web Console (GUI) & REST API
      - "9009:9009"  # InfluxDB Line Protocol (Ingestion)
      - "8812:8812"  # PostgreSQL Wire Protocol (Querying)
    volumes:
      # Persist data locally so it survives container restarts
      - ./questdb_data:/var/lib/questdb/quest_data
    environment:
      - QDB_CAIRO_COMMIT_LAG=1000 # Commit data to disk faster (1s)
      - QDB_CAIRO_MAX_UNCOMMITTED_ROWS=1000
